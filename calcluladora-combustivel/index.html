<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#28a745">
<link rel="manifest" href="manifest.json">
<title>Calculadora Etanol x Gasolina</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#f0f2f5;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.15);
        width:350px;
        text-align:center;
    }

    h1{
        margin-bottom:20px;
        color:#333;
    }

    label{
        display:block;
        text-align:left;
        margin-top:15px;
        margin-bottom:5px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:16px;
    }

    button{
        margin-top:15px;
        padding:12px;
        border:none;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
        width:100%;
    }

    .btn-calcular{
        background:#28a745;
        color:white;
    }

    .btn-calcular:hover{
        background:#218838;
    }

    .btn-inverter{
        background:#007bff;
        color:white;
    }

    .btn-inverter:hover{
        background:#0069d9;
    }

    .resultado{
        margin-top:20px;
        padding:15px;
        border-radius:10px;
        font-size:18px;
        font-weight:bold;
    }

    .etanol{
        background:#d4edda;
        color:#155724;
    }

    .gasolina{
        background:#fff3cd;
        color:#856404;
    }
</style>
</head>

<body>

<div class="container">

    <h1>⛽ Etanol x Gasolina</h1>

    <label>Preço do Etanol (R$)</label>
    <input type="number" id="txtEtanol" step="0.01" placeholder="Ex: 4.59">

    <label>Preço da Gasolina (R$)</label>
    <input type="number" id="txtGasolina" step="0.01" placeholder="Ex: 6.49">

    <button class="btn-calcular" onclick="calcular()">
        Calcular
    </button>

    <button class="btn-inverter" onclick="inverterValores()">
        🔄 Inverter Valores
    </button>

    <div id="resultado" class="resultado">
        Informe os preços e clique em Calcular.
    </div>

</div>

<script>

function calcular(){

    let precoEtanol =
        parseFloat(document.getElementById("txtEtanol").value);

    let precoGasolina =
        parseFloat(document.getElementById("txtGasolina").value);

    if(isNaN(precoEtanol) || isNaN(precoGasolina)){
        alert("Preencha os dois preços!");
        return;
    }

    let resultado =
        document.getElementById("resultado");

    if(precoEtanol <= precoGasolina * 0.7){

        resultado.className = "resultado etanol";

        resultado.innerHTML =
            "🌱 Compensa abastecer com ETANOL";
    }
    else{

        resultado.className = "resultado gasolina";

        resultado.innerHTML =
            "⛽ Compensa abastecer com GASOLINA";
    }
}

function inverterValores(){

    let temp =
        document.getElementById("txtEtanol").value;

    document.getElementById("txtEtanol").value =
        document.getElementById("txtGasolina").value;

    document.getElementById("txtGasolina").value =
        temp;
}

</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log('PWA instalado'))
    .catch(err => console.log(err));
}
</script>

</body>
</html>
